<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      .card {
        position: relative;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background: #0f1113;
        font-family: "IBM Plex Sans", system-ui, sans-serif;
        color: #e4e7eb;
      }
      .radar { position: absolute; inset: 0; }
      /* Darken the left so the wordmark stays legible over the radar. */
      .scrim {
        position: absolute; inset: 0;
        background: linear-gradient(
          100deg,
          #0f1113 30%,
          rgba(15, 17, 19, 0.82) 46%,
          rgba(15, 17, 19, 0.15) 70%,
          rgba(15, 17, 19, 0) 100%
        );
      }
      .content {
        position: absolute;
        left: 84px;
        top: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 28px;
        max-width: 640px;
      }
      .brand { display: flex; align-items: center; gap: 22px; }
      .mark {
        width: 88px; height: 88px; border-radius: 22px;
        background: #16181b;
        border: 1px solid #25282d;
        display: flex; align-items: center; justify-content: center;
      }
      .wordmark {
        font-weight: 700;
        font-size: 78px;
        letter-spacing: -0.02em;
        line-height: 1;
        color: #f3f5f7;
      }
      .tagline {
        font-size: 36px;
        font-weight: 400;
        line-height: 1.32;
        color: #9fa6ae;
        max-width: 560px;
      }
      .footer { display: flex; align-items: center; gap: 18px; margin-top: 4px; }
      .pill {
        font-family: "IBM Plex Mono", monospace;
        font-size: 21px;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: #0f1113;
        background: #f27200;
        padding: 7px 15px;
        border-radius: 6px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 12px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 24px;
        font-weight: 400;
        letter-spacing: 0.01em;
        color: #9fa6ae;
      }
      .dot {
        width: 9px; height: 9px; border-radius: 50%;
        background: #2dc07d;
        display: inline-block;
      }
      .rng-label {
        font-family: "IBM Plex Mono", monospace;
        fill: #6c727a;
        font-size: 16px;
        letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <svg class="radar" viewBox="0 0 1200 630" fill="none" role="img" aria-label="Aircraft radar">
        <defs>
          <!-- top-down aircraft silhouette, centred, nose toward -Y -->
          <g id="ac">
            <path
              d="M0 -13 C1.1 -13 1.7 -11.4 1.7 -9.2 L1.7 -4.2 L12 1.2 L12 3.9 L1.7 1.4 L1.7 7.6 L4.3 10.2 L4.3 12.4 L0 10.8 L-4.3 12.4 L-4.3 10.2 L-1.7 7.6 L-1.7 1.4 L-12 3.9 L-12 1.2 L-1.7 -4.2 L-1.7 -9.2 C-1.7 -11.4 -1.1 -13 0 -13 Z"
            />
          </g>
        </defs>

        <!-- range rings around the receiver -->
        <g stroke-width="1.5" stroke-dasharray="3 7">
          <circle cx="905" cy="312" r="150" stroke="#2a2e33" />
          <circle cx="905" cy="312" r="250" stroke="#262a2f" />
          <circle cx="905" cy="312" r="350" stroke="#222529" />
          <circle cx="905" cy="312" r="455" stroke="#1e2125" />
        </g>
        <circle cx="905" cy="312" r="4.5" fill="#4cc2db" />
        <circle cx="905" cy="312" r="11" fill="none" stroke="#4cc2db" stroke-opacity="0.35" stroke-width="1.5" />
        <text class="rng-label" x="905" y="487" text-anchor="middle">50&#8201;nm</text>

        <!-- traffic: trail (faded) + glyph, coloured by altitude band -->
        <!-- 1 -->
        <path d="M739 214 L788 196" stroke="#F05E24" stroke-opacity="0.32" stroke-width="3" stroke-linecap="round" />
        <use href="#ac" x="0" y="0" transform="translate(788 196) rotate(70) scale(1.55)" fill="#F05E24" />
        <!-- 2 -->
        <path d="M1036 221 L1018 270" stroke="#FF8A22" stroke-opacity="0.3" stroke-width="3" stroke-linecap="round" />
        <use href="#ac" transform="translate(1018 270) rotate(200) scale(1.5)" fill="#FF8A22" />
        <!-- 3 -->
        <path d="M909 472 L876 432" stroke="#F1B846" stroke-opacity="0.3" stroke-width="3" stroke-linecap="round" />
        <use href="#ac" transform="translate(876 432) rotate(320) scale(1.5)" fill="#F1B846" />
        <!-- 4 -->
        <path d="M988 477 L1010 430" stroke="#36C98A" stroke-opacity="0.32" stroke-width="3" stroke-linecap="round" />
        <use href="#ac" transform="translate(1010 430) rotate(25) scale(1.6)" fill="#36C98A" />
        <!-- 5 -->
        <path d="M979 106 L992 156" stroke="#55C9DE" stroke-opacity="0.3" stroke-width="3" stroke-linecap="round" />
        <use href="#ac" transform="translate(992 156) rotate(165) scale(1.45)" fill="#55C9DE" />
        <!-- 6 -->
        <path d="M1135 354 L1086 372" stroke="#69AFCB" stroke-opacity="0.28" stroke-width="3" stroke-linecap="round" />
        <use href="#ac" transform="translate(1086 372) rotate(250) scale(1.4)" fill="#69AFCB" />
        <!-- 7 -->
        <path d="M709 347 L760 356" stroke="#36C98A" stroke-opacity="0.3" stroke-width="3" stroke-linecap="round" />
        <use href="#ac" transform="translate(760 356) rotate(100) scale(1.5)" fill="#36C98A" />
      </svg>

      <div class="scrim"></div>

      <div class="content">
        <div class="brand">
          <div class="mark">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" role="img" aria-label="Ident"
              stroke="#e4e7eb" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
            </svg>
          </div>
          <div class="wordmark">Ident</div>
        </div>
        <div class="tagline">
          Live traffic from your own ADS-B receiver, in a fast modern interface
          for desktop, tablet, and phone.
        </div>
      </div>
    </div>
  </body>
</html>
